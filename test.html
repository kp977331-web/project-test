<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            
            background-color: #f4f4f4;
        }

        .form-container {
            
            padding: 0px;
            border-radius: 0px; 
            display: flex;
           
        }

        .input-group {
            display: flex;
            /* flex-direction: column; */
            align-items: center;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            border: none;
        }

        .add-btn {
        
            color:black;
            align-self: flex-end;
            
        }

        #expenseList {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .expense-item {
            
           padding:2px;
         
            display: flex;
            align-items: center;
           
        }

        .delete-btn {
            color: black;
        }

        .edit-btn {
            border: 2px solid black;
            color: black;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="input-group">
            <label>Choose expenses:</label>
            <input type="number" id="amount" placeholder="Enter amount">
        </div>

        <div class="input-group">
            <label>Choose description:</label>
            <input list="descriptions" id="description" placeholder="Choose or type...">
            <datalist id="descriptions">
                 <option value="petrol">
            <option value="sads">
            <option value="diesel">
            <option value="on vacations">
            <option value="1233">
            <option value="hello">
            </datalist>
        </div>

        <div class="input-group">
            <label>Choose a category:</label>
            <select id="category">
                <option value="Fuel">Fuel</option>
                <option value="Food">Food</option>
                <option value="Movie">Movie</option>
                <option value="Electricity">Electricity</option>
            </select>
        </div>

        <button class="add-btn" onclick="addExpense()">Add Expense</button>
    </div>

    <ul id="expenseList"></ul>

    <script>
        
        document.addEventListener('DOMContentLoaded', getExpenses);

        function addExpense() {
            const amount = document.getElementById('amount').value;
            const description = document.getElementById('description').value;
            const category = document.getElementById('category').value;

            if (amount === '' || description === '') {
                alert("Please fill in all fields");
                return;
            }

            const expenseObj = {
                id: Date.now(),
                amount,
                description,
                category
            };

            saveLocalExpense(expenseObj);
            renderExpense(expenseObj);

            
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
        }

        function renderExpense(expense) {
            const ul = document.getElementById('expenseList');
            const li = document.createElement('li');
            li.className = 'expense-item';
            li.setAttribute('data-id', expense.id);

            li.innerHTML = `
                <span>${expense.amount} - ${expense.category} - ${expense.description}</span>
                <button class="delete-btn" onclick="deleteExpense(${expense.id})">Delete Expense</button>
                <button class="edit-btn" onclick="editExpense(${expense.id})">Edit Expense</button>
            `;
            ul.appendChild(li);
        }

        function deleteExpense(id) {
        
            const items = document.querySelectorAll('.expense-item');
            items.forEach(item => {
                if(item.getAttribute('data-id') == id) item.remove();
            });

            
            let expenses = JSON.parse(localStorage.getItem('expenses'));
            expenses = expenses.filter(exp => exp.id !== id);
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        function editExpense(id) {
            let expenses = JSON.parse(localStorage.getItem('expenses'));
            const expenseToEdit = expenses.find(exp => exp.id === id);

            
            document.getElementById('amount').value = expenseToEdit.amount;
            document.getElementById('description').value = expenseToEdit.description;
            document.getElementById('category').value = expenseToEdit.category;

           
            deleteExpense(id);
        }

        function saveLocalExpense(expense) {
            let expenses = localStorage.getItem('expenses') ? JSON.parse(localStorage.getItem('expenses')) : [];
            expenses.push(expense);
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        function getExpenses() {
            let expenses = localStorage.getItem('expenses') ? JSON.parse(localStorage.getItem('expenses')) : [];
            expenses.forEach(expense => renderExpense(expense));
        }
    </script>
</body>
</html>
